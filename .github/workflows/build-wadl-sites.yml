name: Build WADL sites

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Prepare 2025 source
        run: |
          rm -rf .build-2025 .build-2026 _site
          mkdir -p .build-2025 .build-2026
          cp -R 2025/. .build-2025/
          cp -R _layouts _includes _sass assets images .build-2025/
          cp -f 404.html favicon.ico favicon.png .build-2025/ || true

      - name: Build 2025
        run: bundle exec jekyll build --source .build-2025 --destination _site/2025

      - name: Prepare 2026 source
        run: |
          cp -R 2026/. .build-2026/
          cp -R _layouts _includes _sass assets images .build-2026/
          cp -f 404.html favicon.ico favicon.png .build-2026/ || true

      - name: Build 2026
        run: bundle exec jekyll build --source .build-2026 --destination _site/2026

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4